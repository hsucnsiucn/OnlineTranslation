<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">
        <title>翻译助手</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box
            }

            :root {
                --bg: #f5f5f5;
                --card: #fff;
                --border: #e0e0e0;
                --primary: #4a6fa5;
                --primary-hover: #3a5a8a;
                --text: #333;
                --text-light: #888;
                --radius: 8px
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
                background: var(--bg);
                color: var(--text);
                height: 100vh;
                display: flex;
                flex-direction: column;
                overflow: hidden
            }

            .header {
                background: var(--card);
                border-bottom: 1px solid var(--border);
                padding: 12px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0
            }

            .header h1 {
                font-size: 18px;
                font-weight: 600;
                color: var(--primary)
            }

            .header-actions {
                display: flex;
                gap: 8px;
                align-items: center
            }

            .btn {
                padding: 6px 16px;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                background: var(--card);
                color: var(--text);
                cursor: pointer;
                font-size: 13px;
                transition: all .2s
            }

            .btn:hover {
                background: var(--bg)
            }

            .btn-primary {
                background: var(--primary);
                color: #fff;
                border-color: var(--primary)
            }

            .btn-primary:hover {
                background: var(--primary-hover)
            }

            .btn-primary:disabled {
                opacity: .5;
                cursor: not-allowed
            }

            .settings-panel {
                background: var(--card);
                border-bottom: 1px solid var(--border);
                overflow: hidden;
                transition: max-height .3s ease;
                max-height: 0
            }

            .settings-panel.open {
                max-height: 500px
            }

            .settings-inner {
                padding: 16px 20px;
                display: flex;
                flex-direction: column;
                gap: 12px
            }

            .setting-row {
                display: flex;
                gap: 12px;
                align-items: center
            }

            .setting-row label {
                font-size: 13px;
                color: var(--text-light);
                white-space: nowrap;
                min-width: 80px
            }

            .setting-row input,
            .setting-row textarea {
                flex: 1;
                padding: 8px 12px;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                font-size: 13px;
                font-family: inherit;
                outline: none;
                transition: border-color .2s
            }

            .setting-row input:focus,
            .setting-row textarea:focus {
                border-color: var(--primary)
            }

            .setting-row textarea {
                resize: vertical;
                min-height: 80px;
                font-family: "Cascadia Code", Consolas, "Courier New", monospace;
                font-size: 12px;
                line-height: 1.5
            }

            .main {
                flex: 1;
                display: flex;
                gap: 0;
                overflow: hidden;
                padding: 0
            }

            .panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 16px;
                overflow: hidden
            }

            .panel-left {
                border-right: 1px solid var(--border)
            }

            .panel-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 8px;
                flex-shrink: 0
            }

            .panel-title {
                font-size: 13px;
                color: var(--text-light);
                font-weight: 500
            }

            .lang-badge {
                font-size: 12px;
                padding: 2px 10px;
                border-radius: 12px;
                background: #e8f0fe;
                color: var(--primary);
                font-weight: 500
            }

            textarea.translate-box {
                flex: 1;
                width: 100%;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 14px;
                font-size: 15px;
                line-height: 1.7;
                resize: none;
                outline: none;
                font-family: inherit;
                transition: border-color .2s;
                background: var(--card)
            }

            textarea.translate-box:focus {
                border-color: var(--primary)
            }

            textarea.translate-box:read-only {
                background: #fafafa;
                cursor: default
            }

            .panel-footer {
                margin-top: 8px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0
            }

            .char-count {
                font-size: 12px;
                color: var(--text-light)
            }

            .translate-btn {
                padding: 10px 32px;
                font-size: 14px;
                font-weight: 500
            }

            .status-bar {
                background: var(--card);
                border-top: 1px solid var(--border);
                padding: 6px 20px;
                font-size: 12px;
                color: var(--text-light);
                display: flex;
                justify-content: space-between;
                flex-shrink: 0
            }

            .status-bar .error {
                color: #e74c3c
            }

            .loading {
                display: inline-block;
                width: 14px;
                height: 14px;
                border: 2px solid var(--border);
                border-top-color: var(--primary);
                border-radius: 50%;
                animation: spin .6s linear infinite;
                vertical-align: middle;
                margin-right: 6px
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg)
                }
            }

            @media(max-width:768px) {
                .main {
                    flex-direction: column
                }

                .panel-left {
                    border-right: none;
                    border-bottom: 1px solid var(--border)
                }

                .setting-row {
                    flex-direction: column;
                    align-items: stretch
                }

                .setting-row label {
                    min-width: auto
                }
            }
        </style>
    </head>

    <body>

        <div class="header">
            <h1>翻译助手</h1>
            <div class="header-actions">
                <button class="btn"
                        id="toggleSettings">⚙ 设置</button>
            </div>
        </div>

        <div class="settings-panel"
             id="settingsPanel">
            <div class="settings-inner">
                <div class="setting-row">
                    <label>API 地址</label>
                    <input type="text"
                           id="baseUrl"
                           placeholder="https://api.deepseek.com/v1">
                </div>
                <div class="setting-row">
                    <label>API Key</label>
                    <input type="password"
                           id="apiKey"
                           placeholder="sk-...">
                </div>
                <div class="setting-row">
                    <label>模型</label>
                    <input type="text"
                           id="modelName"
                           placeholder="deepseek-chat">
                </div>
                <div class="setting-row">
                    <label>System Prompt</label>
                    <textarea id="systemPrompt"
                              rows="4"></textarea>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="panel panel-left">
                <div class="panel-header">
                    <span class="panel-title">输入</span>
                    <span class="lang-badge"
                          id="sourceLang">自动检测</span>
                </div>
                <textarea class="translate-box"
                          id="inputBox"
                          placeholder="在此输入要翻译的文本..."></textarea>
                <div class="panel-footer">
                    <span class="char-count"
                          id="charCount">0 字符</span>
                    <button class="btn btn-primary translate-btn"
                            id="translateBtn">翻译</button>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">输出</span>
                    <span class="lang-badge"
                          id="targetLang">-</span>
                </div>
                <textarea class="translate-box"
                          id="outputBox"
                          readonly
                          placeholder="翻译结果将显示在这里..."></textarea>
                <div class="panel-footer">
                    <span class="char-count"
                          id="outputCharCount">0 字符</span>
                    <button class="btn"
                            id="copyBtn">复制</button>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">就绪</span>
            <span id="tokenInfo"></span>
        </div>

        <script>
            const DEFAULTS = {
                baseUrl: 'https://api.deepseek.com/v1',
                apiKey: '',
                model: 'deepseek-chat',
                systemPrompt: `你是一个专业的简体中文母语译者，需将文本流畅地翻译为简体中文。

## 翻译规则
1. 仅输出译文内容，禁止解释或添加任何额外内容（如"以下是翻译："、"译文如下："等）
2. 返回的译文必须和原文保持完全相同的段落数量和格式
3. 如果文本包含HTML标签，请在翻译后考虑标签应放在译文的哪个位置，同时保持译文的流畅性
4. 对于无需翻译的内容（如专有名词、代码等），请保留原文

## Context Awareness
Document Metadata:
Title: 《Options》`
            };

            const $ = id => document.getElementById(id);

            const els = {
                toggleSettings: $('toggleSettings'),
                settingsPanel: $('settingsPanel'),
                baseUrl: $('baseUrl'),
                apiKey: $('apiKey'),
                modelName: $('modelName'),
                systemPrompt: $('systemPrompt'),
                inputBox: $('inputBox'),
                outputBox: $('outputBox'),
                translateBtn: $('translateBtn'),
                copyBtn: $('copyBtn'),
                sourceLang: $('sourceLang'),
                targetLang: $('targetLang'),
                charCount: $('charCount'),
                outputCharCount: $('outputCharCount'),
                statusText: $('statusText'),
                tokenInfo: $('tokenInfo')
            };

            function loadConfig() {
                const saved = localStorage.getItem('trans_config');
                if (saved) {
                    try {
                        const cfg = JSON.parse(saved);
                        els.baseUrl.value = cfg.baseUrl || DEFAULTS.baseUrl;
                        els.apiKey.value = cfg.apiKey || '';
                        els.modelName.value = cfg.model || DEFAULTS.model;
                        els.systemPrompt.value = cfg.systemPrompt || DEFAULTS.systemPrompt;
                        return;
                    } catch (e) { }
                }
                els.baseUrl.value = DEFAULTS.baseUrl;
                els.apiKey.value = '';
                els.modelName.value = DEFAULTS.model;
                els.systemPrompt.value = DEFAULTS.systemPrompt;
            }

            function saveConfig() {
                const cfg = {
                    baseUrl: els.baseUrl.value.trim(),
                    apiKey: els.apiKey.value.trim(),
                    model: els.modelName.value.trim(),
                    systemPrompt: els.systemPrompt.value
                };
                localStorage.setItem('trans_config', JSON.stringify(cfg));
            }

            function detectLanguage(text) {
                if (!text.trim()) return 'unknown';
                const chineseChars = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;
                const totalChars = text.replace(/\s/g, '').length;
                if (totalChars === 0) return 'unknown';
                const ratio = chineseChars / totalChars;
                return ratio > 0.15 ? 'zh' : 'en';
            }

            function updateLangIndicator() {
                const text = els.inputBox.value;
                const lang = detectLanguage(text);
                if (lang === 'zh') {
                    els.sourceLang.textContent = '中文';
                    els.targetLang.textContent = 'English';
                } else if (lang === 'en') {
                    els.sourceLang.textContent = 'English';
                    els.targetLang.textContent = '中文';
                } else {
                    els.sourceLang.textContent = '自动检测';
                    els.targetLang.textContent = '-';
                }
                els.charCount.textContent = `${text.length} 字符`;
            }

            function getUserMessage(text, lang) {
                if (lang === 'zh') {
                    return `Translate to English (output translation only):\n\n${text}`;
                } else {
                    return `翻译为简体中文（仅输出译文内容）：\n\n${text}`;
                }
            }

            async function translate() {
                const text = els.inputBox.value.trim();
                if (!text) return;

                const baseUrl = els.baseUrl.value.trim();
                const apiKey = els.apiKey.value.trim();
                const model = els.modelName.value.trim() || DEFAULTS.model;
                const systemPrompt = els.systemPrompt.value;

                if (!apiKey) {
                    els.statusText.textContent = '请先设置 API Key';
                    els.statusText.className = 'error';
                    els.settingsPanel.classList.add('open');
                    return;
                }

                const lang = detectLanguage(text);
                if (lang === 'unknown') {
                    els.statusText.textContent = '无法检测语言，请输入中文或英文';
                    return;
                }

                els.translateBtn.disabled = true;
                els.outputBox.value = '';
                els.outputCharCount.textContent = '0 字符';
                els.statusText.className = '';
                els.statusText.innerHTML = '<span class="loading"></span>翻译中...';
                els.tokenInfo.textContent = '';

                const url = `${baseUrl.replace(/\/+$/, '')}/chat/completions`;
                const body = {
                    model: model,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: getUserMessage(text, lang) }
                    ],
                    stream: true
                };

                try {
                    const resp = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(body)
                    });

                    if (!resp.ok) {
                        const errText = await resp.text();
                        let errMsg = `HTTP ${resp.status}`;
                        try {
                            const errJson = JSON.parse(errText);
                            errMsg = errJson.error?.message || errMsg;
                        } catch (e) {
                            errMsg = errText.substring(0, 200) || errMsg;
                        }
                        throw new Error(errMsg);
                    }

                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    let result = '';
                    let buffer = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            const trimmed = line.trim();
                            if (!trimmed || !trimmed.startsWith('data: ')) continue;
                            const data = trimmed.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices?.[0]?.delta?.content;
                                if (delta) {
                                    result += delta;
                                    els.outputBox.value = result;
                                    els.outputCharCount.textContent = `${result.length} 字符`;
                                }
                                if (json.usage) {
                                    els.tokenInfo.textContent = `Prompt: ${json.usage.prompt_tokens} | Completion: ${json.usage.completion_tokens} | Total: ${json.usage.total_tokens}`;
                                }
                            } catch (e) { }
                        }
                    }

                    els.statusText.textContent = '翻译完成';
                } catch (err) {
                    els.outputBox.value = '';
                    els.statusText.textContent = `错误: ${err.message}`;
                    els.statusText.className = 'error';
                } finally {
                    els.translateBtn.disabled = false;
                }
            }

            els.toggleSettings.addEventListener('click', () => {
                els.settingsPanel.classList.toggle('open');
            });

            els.inputBox.addEventListener('input', updateLangIndicator);

            els.translateBtn.addEventListener('click', translate);

            els.copyBtn.addEventListener('click', () => {
                const text = els.outputBox.value;
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    els.copyBtn.textContent = '已复制';
                    setTimeout(() => { els.copyBtn.textContent = '复制'; }, 1500);
                });
            });

            [els.baseUrl, els.apiKey, els.modelName, els.systemPrompt].forEach(el => {
                el.addEventListener('change', saveConfig);
                el.addEventListener('input', saveConfig);
            });

            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    translate();
                }
            });

            loadConfig();
            updateLangIndicator();
        </script>
    </body>

</html>
